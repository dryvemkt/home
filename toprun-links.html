<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --brand:    #F06B28;
    --black:    #0d0d0d;
    --white:    #ffffff;
    --gray:     #888888;
    --light:    #f2f0ed;
    --border:   rgba(255,255,255,0.1);
    --font-d:   'Barlow Condensed', sans-serif;
    --font-b:   'Barlow', sans-serif;
  }
 
  html { scroll-behavior: smooth; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-b);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }
  ::selection { background: var(--brand); color: #fff; }
 
  /* ── BACKGROUND ── */
  .bg-wrap {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
  }
  /* diagonal stripe texture */
  .bg-stripes {
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      -55deg,
      rgba(255,255,255,0.018) 0px,
      rgba(255,255,255,0.018) 1px,
      transparent 1px,
      transparent 22px
    );
  }
  /* accent glow at top */
  .bg-glow {
    position: absolute; top: -120px; left: 50%;
    transform: translateX(-50%);
    width: 520px; height: 320px;
    background: radial-gradient(ellipse at center, var(--brand) 0%, transparent 70%);
    opacity: 0.13; filter: blur(30px);
    pointer-events: none;
  }
  /* bottom accent */
  .bg-glow-b {
    position: absolute; bottom: -100px; right: -80px;
    width: 380px; height: 280px;
    background: radial-gradient(ellipse at center, var(--brand) 0%, transparent 70%);
    opacity: 0.07; filter: blur(40px);
    pointer-events: none;
  }
 
  /* ── WRAPPER ── */
  .page-wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 480px;
    padding: 3rem 1.25rem 4rem;
    display: flex; flex-direction: column; align-items: center;
    gap: 0;
  }
 
  /* ── CAPA (cover image) ── */
  .cover-wrap {
    width: 100%;
    position: relative;
    border-radius: 10px 10px 0 0;
    overflow: hidden;
    flex-shrink: 0;
  }
  .cover-wrap img {
    width: 100%; display: block;
    aspect-ratio: 3/1; object-fit: cover;
  }
  /* gradient fade at bottom so avatar floats nicely */
  .cover-wrap::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 60%;
    background: linear-gradient(to bottom, transparent, var(--black));
    pointer-events: none;
  }
  /* avatar repositioned over cover */
  .has-cover .avatar-wrap {
    margin-top: -44px;
    margin-bottom: 0.7rem;
    z-index: 2;
    border-color: var(--black);
    box-shadow: 0 0 0 3px var(--brand), 0 0 0 5px var(--black);
  }
  /* no cover: keep original spacing */
  .page-wrap:not(.has-cover) .avatar-wrap {
    margin-bottom: 1.1rem;
  }
 
  /* ── AVATAR / LOGO ── */
  .avatar-wrap {
    width: 88px; height: 88px;
    border-radius: 50%;
    border: 2.5px solid var(--brand);
    overflow: hidden;
    margin-bottom: 1.1rem;
    position: relative;
    flex-shrink: 0;
    opacity: 0; animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.05s forwards;
    background: #1a1a1a;
    display: flex; align-items: center; justify-content: center;
  }
  .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .avatar-initials {
    font-family: var(--font-d); font-size: 1.9rem; font-weight: 900;
    letter-spacing: 0.04em; color: var(--brand); line-height: 1;
    user-select: none;
  }
  /* pulse ring */
  .avatar-ring {
    position: absolute; inset: -6px; border-radius: 50%;
    border: 1.5px solid var(--brand);
    opacity: 0; animation: ring-pulse 3s ease-in-out 1.5s infinite;
  }
  @keyframes ring-pulse {
    0%   { opacity: 0; transform: scale(0.9); }
    30%  { opacity: 0.5; }
    100% { opacity: 0; transform: scale(1.2); }
  }
 
  /* ── NAME ── */
  .profile-name {
    font-family: var(--font-d); font-weight: 900;
    font-size: 2.4rem; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--white); line-height: 1; margin-bottom: 0.3rem;
    text-align: center;
    opacity: 0; animation: fu 0.5s ease 0.15s forwards;
  }
  .profile-slogan {
    font-family: var(--font-d); font-size: 0.78rem; font-weight: 700;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--brand); margin-bottom: 0.8rem; text-align: center;
    opacity: 0; animation: fu 0.5s ease 0.22s forwards;
  }
  .profile-bio {
    font-size: 0.85rem; font-weight: 300; color: rgba(255,255,255,0.42);
    text-align: center; line-height: 1.65; max-width: 320px;
    margin-bottom: 2.2rem;
    opacity: 0; animation: fu 0.5s ease 0.28s forwards;
  }
 
  /* ── DIVIDER ── */
  .divider {
    width: 100%; display: flex; align-items: center; gap: 0.8rem;
    margin-bottom: 1.6rem;
    opacity: 0; animation: fu 0.5s ease 0.32s forwards;
  }
  .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
  .divider-dot  { width: 5px; height: 5px; border-radius: 50%; background: var(--brand); }
 
  /* ── LINKS ── */
  .links-list {
    width: 100%; display: flex; flex-direction: column; gap: 0.7rem;
    margin-bottom: 2.5rem;
  }
 
  .link-item {
    display: flex; align-items: center; gap: 0.9rem;
    padding: 0.95rem 1.1rem;
    border-radius: 7px;
    text-decoration: none;
    position: relative; overflow: hidden;
    transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1),
                box-shadow 0.2s ease,
                opacity 0.2s ease;
    opacity: 0;
    /* stagger set by JS */
  }
  .link-item.visible { opacity: 1; }
  .link-item:hover { transform: translateY(-2px) scale(1.01); }
  .link-item:active { transform: scale(0.98); }
 
  /* ripple on tap */
  .link-item::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(255,255,255,0.06);
    opacity: 0; transition: opacity 0.15s;
  }
  .link-item:active::after { opacity: 1; }
 
  /* estilos de fundo */
  .link-item.primario {
    background: var(--brand);
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }
  .link-item.primario:hover { box-shadow: 0 8px 28px color-mix(in srgb, var(--brand) 50%, transparent); }
  .link-item.secundario {
    background: transparent;
    border: 1.5px solid var(--brand);
  }
  .link-item.secundario:hover { background: rgba(255,255,255,0.04); }
  .link-item.escuro {
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .link-item.escuro:hover { border-color: rgba(255,255,255,0.2); background: #222; box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
  .link-item.claro {
    background: var(--white);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .link-item.claro:hover { box-shadow: 0 6px 22px rgba(255,255,255,0.12); }
 
  /* ícone wrapper */
  .link-icon {
    width: 36px; height: 36px; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .primario  .link-icon { background: rgba(0,0,0,0.2); }
  .secundario .link-icon { background: rgba(255,255,255,0.06); }
  .escuro    .link-icon { background: rgba(255,255,255,0.06); }
  .claro     .link-icon { background: rgba(0,0,0,0.07); }
 
  /* ícone svg cor */
  .primario  .link-icon svg { stroke: #fff; fill: none; }
  .secundario .link-icon svg { stroke: var(--brand); fill: none; }
  .escuro    .link-icon svg { stroke: rgba(255,255,255,0.7); fill: none; }
  .claro     .link-icon svg { stroke: #333; fill: none; }
  /* ícones filled */
  .primario  .link-icon svg.filled { fill: #fff; stroke: none; }
  .secundario .link-icon svg.filled { fill: var(--brand); stroke: none; }
  .escuro    .link-icon svg.filled { fill: rgba(255,255,255,0.7); stroke: none; }
  .claro     .link-icon svg.filled { fill: #333; stroke: none; }
 
  /* textos */
  .link-text { flex: 1; min-width: 0; }
  .link-titulo {
    font-family: var(--font-d); font-weight: 800;
    font-size: 1.05rem; letter-spacing: 0.04em; text-transform: uppercase;
    line-height: 1; margin-bottom: 0.18rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .link-sub {
    font-size: 0.75rem; font-weight: 300;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1;
  }
 
  /* cores de texto por estilo */
  .primario  .link-titulo { color: #fff; }
  .primario  .link-sub    { color: rgba(255,255,255,0.65); }
  .secundario .link-titulo{ color: #fff; }
  .secundario .link-sub   { color: rgba(255,255,255,0.4); }
  .escuro    .link-titulo  { color: #fff; }
  .escuro    .link-sub     { color: rgba(255,255,255,0.4); }
  .claro     .link-titulo  { color: #111; }
  .claro     .link-sub     { color: #777; }
 
  /* badge */
  .link-badge {
    font-family: var(--font-d); font-size: 0.62rem; font-weight: 800;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 0.18rem 0.5rem; border-radius: 3px; flex-shrink: 0;
    line-height: 1.4;
  }
  .primario  .link-badge { background: rgba(0,0,0,0.25); color: #fff; }
  .secundario .link-badge{ background: var(--brand); color: #fff; }
  .escuro    .link-badge  { background: var(--brand); color: #fff; }
  .claro     .link-badge  { background: #111; color: #fff; }
 
  /* seta */
  .link-arrow {
    flex-shrink: 0; opacity: 0.4;
    transition: transform 0.18s, opacity 0.18s;
  }
  .link-item:hover .link-arrow { transform: translateX(3px); opacity: 0.8; }
  .primario  .link-arrow svg { stroke: #fff; fill: none; }
  .secundario .link-arrow svg { stroke: #fff; fill: none; }
  .escuro    .link-arrow svg { stroke: #fff; fill: none; }
  .claro     .link-arrow svg { stroke: #333; fill: none; }
 
  /* ── FOOTER ── */
  .page-footer {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.72rem; color: rgba(255,255,255,0.2);
    font-weight: 300;
    opacity: 0; animation: fu 0.5s ease 0.8s forwards;
  }
  .page-footer a {
    font-family: var(--font-d); font-size: 0.78rem; font-weight: 800;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,255,255,0.35); text-decoration: none;
    transition: color 0.2s;
  }
  .page-footer a:hover { color: var(--brand); }
 
  /* ── ANIMATIONS ── */
  @keyframes fu  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pop { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }
 
  /* ── MOBILE ── */
  @media (max-width: 480px) {
    .page-wrap { padding: 2.5rem 1rem 3.5rem; }
    .profile-name { font-size: 2rem; }
  }
</style>
</head>

    loja:      `<svg width="18" height="18" viewBox="0 0 24 24" stroke-width="1.8"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>`,
    calendario:`<svg width="18" height="18" viewBox="0 0 24 24" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
    estrela:   `<svg width="18" height="18" viewBox="0 0 24 24" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
    play:      `<svg width="18" height="18" viewBox="0 0 24 24" stroke-width="0" class="filled"><polygon points="5,3 19,12 5,21"/></svg>`,
    seta:      `<svg width="18" height="18" viewBox="0 0 24 24" stroke-width="1.8"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>`,
  };
  const ARR_SVG = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
 
  /* ── AVATAR ── */
  const avatarWrap = document.getElementById('avatar-wrap');
  if (C.foto) {
    avatarWrap.innerHTML = `<div class="avatar-ring"></div><img src="${C.foto}" alt="${C.nome}" />`;
  } else {
    const initials = C.nome.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
    avatarWrap.innerHTML = `<div class="avatar-ring"></div><span class="avatar-initials">${initials}</span>`;
  }
 
  /* ── TEXTOS ── */
  document.getElementById('profile-name').textContent   = C.nome;
  document.getElementById('profile-slogan').textContent = C.slogan;
  document.getElementById('profile-bio').textContent    = C.bio;
 
  /* ── LINKS ── */
  const list = document.getElementById('links-list');
  C.links.forEach((link, i) => {
    const iconSvg = ICONS[link.icone] || ICONS['seta'];
    const badge   = link.badge ? `<span class="link-badge">${link.badge}</span>` : '';
    const sub     = link.subtitulo ? `<div class="link-sub">${link.subtitulo}</div>` : '';
 
    const el = document.createElement('a');
    el.href   = link.url;
    el.target = '_blank';
    el.rel    = 'noopener noreferrer';
    el.className = `link-item ${link.estilo}`;
    el.style.animationDelay = `${0.35 + i * 0.07}s`;
    el.innerHTML = `
      <div class="link-icon">${iconSvg}</div>
      <div class="link-text">
        <div class="link-titulo">${link.titulo}</div>
        ${sub}
      </div>
      ${badge}
      <div class="link-arrow">${ARR_SVG}</div>
    `;
 
    /* stagger entrance */
    el.style.opacity = '0';
    el.style.transform = 'translateY(16px)';
    setTimeout(() => {
      el.style.transition = 'opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.2,0.64,1), box-shadow 0.2s ease, filter 0.2s ease';
      el.style.opacity    = '1';
      el.style.transform  = 'translateY(0)';
    }, 350 + i * 70);
 
    list.appendChild(el);
  });
 
  /* ── FOOTER ── */
  document.getElementById('page-footer').innerHTML = `
    ${C.rodape_txt}&nbsp;
    <a href="${C.rodape_link}" target="_blank" rel="noopener">${C.rodape_marca}</a>
  `;
 
})();
</script>
</body>
</html>
