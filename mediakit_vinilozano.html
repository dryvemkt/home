<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Media Kit</title>
  <meta name="description" id="page-desc" content="Media Kit oficial para parcerias." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --c1:      #F06B28;
      --c1-dark: #C9521A;
      --c1-light:#FFF0E8;
      --c2:      #00B4AE;
      --c2-dark: #008C87;
      --c2-light:#E0F7F6;
      --dark:    #111111;
      --gray:    #9e9d9d;
      --light:   #F5F4F2;
      --white:   #FFFFFF;
      --border:  rgba(17,17,17,0.1);
      --font-d:  'Barlow Condensed', sans-serif;
      --font-b:  'Barlow', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--white); color: var(--dark); font-family: var(--font-b); font-size: 16px; line-height: 1.6; overflow-x: hidden; }
    ::selection { background: var(--c1); color: #fff; }

    /* ── NAV ── */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 5vw; background: rgba(255,255,255,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid transparent; transition: border-color 0.3s, box-shadow 0.3s; }
    nav.scrolled { border-bottom-color: var(--border); box-shadow: 0 2px 20px rgba(0,0,0,0.06); }
    .nav-logo { display: flex; align-items: center; gap: 0.4rem; text-decoration: none; }
    .logo-word { font-family: var(--font-d); font-size: 2rem; font-weight: 900; letter-spacing: 0.04em; color: var(--c2); line-height: 1; }
    .logo-bar { width: 3px; height: 26px; background: var(--c1); border-radius: 2px; margin-left: 3px; }
    .nav-back { font-family: var(--font-d); font-size: 0.85rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.2s; }
    .nav-back:hover { color: var(--c1); }
    .nav-badge { background: var(--c1); color: #fff; padding: 0.35rem 0.9rem; border-radius: 3px; font-family: var(--font-d); font-size: 0.78rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; }

    /* ── HERO ── */
    #hero-banner { min-height: auto; padding-top: 80px; background: var(--dark); display: grid; grid-template-rows: 1fr auto; position: relative; overflow: hidden; }
    .hb-bg-pat { position: absolute; inset: 0; background-image: repeating-linear-gradient(-45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 18px); z-index: 0; }
    .hb-accent-bar { position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--c1) 0%, var(--c2) 100%); z-index: 2; }
    .hb-side-or { position: absolute; right: 0; top: 0; bottom: 0; width: 38vw; background: var(--c1); clip-path: polygon(12% 0, 100% 0, 100% 100%, 0% 100%); z-index: 0; opacity: 0; animation: fi 0.9s ease 0.3s forwards; }
    .hb-side-pat { position: absolute; right: 0; top: 0; bottom: 0; width: 38vw; background-image: repeating-linear-gradient(-45deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 18px); clip-path: polygon(12% 0, 100% 0, 100% 100%, 0% 100%); z-index: 1; }
    .hb-inner { position: relative; z-index: 3; display: flex; flex-direction: column; justify-content: center; padding: 2.2rem 5vw 1.8rem; max-width: 700px; }
    .hb-eyebrow { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.9rem; opacity: 0; animation: fu 0.6s ease 0.1s forwards; }
    .hb-eyebrow-bar { width: 30px; height: 2px; background: var(--c2); }
    .hb-eyebrow-text { font-family: var(--font-d); font-size: 0.82rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--c2); }
    .hb-name { font-family: var(--font-d); font-weight: 900; font-size: clamp(1rem, 2.5vw, 1.5rem); letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 0.6rem; opacity: 0; animation: fu 0.6s ease 0.15s forwards; }
    .hb-title { font-family: var(--font-d); font-weight: 900; font-size: clamp(2.6rem, 5vw, 5rem); line-height: 0.88; text-transform: uppercase; color: #fff; margin-bottom: 1rem; opacity: 0; animation: fu 0.7s ease 0.2s forwards; }
    .hb-title .c-c1 { color: var(--c1); }
    .hb-title .c-c2 { color: var(--c2); }
    .hb-bio { font-size: 0.9rem; color: rgba(255,255,255,0.6); line-height: 1.65; max-width: 480px; margin-bottom: 1.4rem; font-weight: 300; border-left: 3px solid var(--c1); padding-left: 1.2rem; opacity: 0; animation: fu 0.7s ease 0.35s forwards; }
    .hb-links { display: flex; flex-wrap: wrap; gap: 0.75rem; opacity: 0; animation: fu 0.7s ease 0.5s forwards; }
    .link-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.4rem; font-family: var(--font-d); font-size: 0.92rem; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase; text-decoration: none; border-radius: 4px; transition: transform 0.15s, box-shadow 0.2s, background 0.2s; white-space: nowrap; }
    .link-btn:hover { transform: translateY(-2px); }
    .lb-primary { background: var(--c1); color: #fff; }
    .lb-primary:hover { background: var(--c1-dark); box-shadow: 0 8px 24px rgba(240,107,40,0.4); }
    .lb-teal { background: var(--c2); color: #fff; }
    .lb-teal:hover { background: var(--c2-dark); box-shadow: 0 8px 24px rgba(0,180,174,0.4); }
    .lb-outline { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.3); }
    .lb-outline:hover { border-color: #fff; box-shadow: 0 8px 24px rgba(255,255,255,0.1); }
    .lb-dark { background: var(--dark); color: #fff; border: 2px solid rgba(255,255,255,0.15); }
    .lb-dark:hover { background: #222; }
    .hb-bottom-strip { position: relative; z-index: 3; display: flex; align-items: center; gap: 2rem; padding: 1rem 5vw; border-top: 1px solid rgba(255,255,255,0.08); flex-wrap: wrap; }
    .hb-stat { display: flex; align-items: baseline; gap: 0.4rem; }
    .hb-stat-n { font-family: var(--font-d); font-size: 1.8rem; font-weight: 900; color: var(--c1); }
    .hb-stat-l { font-family: var(--font-d); font-size: 0.78rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
    .hb-sep { width: 1px; height: 32px; background: rgba(255,255,255,0.12); }
    .hb-ig-badge { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; font-family: var(--font-d); font-size: 0.9rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s; }
    .hb-ig-badge:hover { color: var(--c1); }
    .bdot { width: 8px; height: 8px; border-radius: 50%; background: var(--c2); animation: pulse 2s infinite; }

    /* ── LINKTREE ── */
    #linktree { background: var(--white); padding: 4rem 5vw; border-bottom: 1px solid var(--border); }
    .lt-inner { max-width: 520px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .lt-title { font-family: var(--font-d); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gray); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.6rem; }
    .lt-title::before, .lt-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .lt-btn { display: flex; align-items: center; gap: 0.9rem; width: 100%; padding: 0.85rem 1.4rem; border-radius: 100px; text-decoration: none; font-family: var(--font-d); font-size: 1rem; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; border: 2px solid var(--border); background: var(--white); color: var(--dark); transition: transform 0.18s, box-shadow 0.22s, background 0.2s, border-color 0.2s; position: relative; overflow: hidden; }
    .lt-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.09); border-color: var(--c1); color: var(--c1); }
    .lt-btn.lt-c1 { background: var(--c1); color: #fff; border-color: var(--c1); }
    .lt-btn.lt-c1:hover { background: var(--c1-dark); border-color: var(--c1-dark); box-shadow: 0 8px 28px rgba(240,107,40,0.35); color: #fff; }
    .lt-btn.lt-c2 { background: var(--c2); color: #fff; border-color: var(--c2); }
    .lt-btn.lt-c2:hover { background: var(--c2-dark); border-color: var(--c2-dark); box-shadow: 0 8px 28px rgba(0,180,174,0.35); color: #fff; }
    .lt-btn.lt-dark { background: var(--dark); color: #fff; border-color: var(--dark); }
    .lt-btn.lt-dark:hover { background: #222; box-shadow: 0 8px 28px rgba(0,0,0,0.3); color: #fff; }
    .lt-media { width: 38px; height: 38px; border-radius: 50%; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.15); }
    .lt-media img { width: 100%; height: 100%; object-fit: cover; }
    .lt-media svg { opacity: 0.9; }
    .lt-media-icon { width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.07); }
    .lt-btn.lt-c1 .lt-media-icon, .lt-btn.lt-c2 .lt-media-icon, .lt-btn.lt-dark .lt-media-icon { background: rgba(255,255,255,0.15); }
    .lt-label { flex: 1; }
    .lt-arrow { opacity: 0.5; flex-shrink: 0; }
    .lt-btn:hover .lt-arrow { opacity: 1; }

    /* ── SHARED ── */
    section { padding: 5rem 5vw; }
    .stag { display: inline-flex; align-items: center; gap: 0.5rem; font-family: var(--font-d); font-size: 0.78rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--c1); margin-bottom: 1.2rem; }
    .stag::before { content: ''; width: 20px; height: 2px; background: var(--c1); }
    .sh { font-family: var(--font-d); font-weight: 900; font-size: clamp(2.4rem, 4.5vw, 4.2rem); line-height: 0.92; text-transform: uppercase; margin-bottom: 1rem; }
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .d1 { transition-delay: 0.1s; } .d2 { transition-delay: 0.2s; } .d3 { transition-delay: 0.3s; }
    @keyframes fu { from{opacity:0;transform:translateY(28px);} to{opacity:1;transform:translateY(0);} }
    @keyframes fi { from{opacity:0;} to{opacity:1;} }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    /* ── SOBRE ── */
    #sobre { background: var(--white); }
    .sobre-grid { display: grid; grid-template-columns: 1fr 1.4fr; gap: 5rem; align-items: center; }
    .sobre-photo-wrap { position: relative; }
    .sobre-photo-area { width: 100%; aspect-ratio: 3/4; background: var(--light); border-radius: 6px; overflow: hidden; position: relative; }
    .sobre-photo-area img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .sobre-photo-placeholder-inner { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; border: 2px dashed var(--border); font-family: var(--font-d); font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray); }
    .sobre-accent { position: absolute; bottom: -16px; right: -16px; width: 60%; height: 60%; border: 3px solid var(--c1); border-radius: 6px; z-index: -1; }
    .sobre-accent-tl { position: absolute; top: -16px; left: -16px; width: 40%; height: 40%; border: 3px solid var(--c2); border-radius: 6px; z-index: -1; }
    .sobre-r .eyebrow { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1.5rem; }
    .sobre-r .eyebrow-bar { width: 30px; height: 2px; background: var(--c1); }
    .sobre-r .eyebrow-text { font-family: var(--font-d); font-size: 0.82rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--c1); }
    .sobre-nome { font-family: var(--font-d); font-weight: 900; font-size: clamp(2.8rem, 5vw, 5rem); line-height: 0.88; text-transform: uppercase; margin-bottom: 1.5rem; }
    .sobre-bio { font-size: 0.97rem; color: var(--gray); line-height: 1.8; margin-bottom: 1.5rem; }
    .sobre-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 2rem; }
    .stag-pill { font-family: var(--font-d); font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.35rem 0.9rem; border-radius: 20px; }
    .sp-c1 { background: var(--c1-light); color: var(--c1); }
    .sp-c2 { background: var(--c2-light); color: var(--c2-dark); }
    .sp-bk { background: var(--dark); color: #fff; }
    .sobre-highlights { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .sh-card { background: var(--light); border-radius: 6px; padding: 1.2rem; border-left: 3px solid var(--c1); }
    .sh-card.tl { border-left-color: var(--c2); }
    .sh-card h5 { font-family: var(--font-d); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gray); margin-bottom: 0.3rem; }
    .sh-card p { font-family: var(--font-d); font-size: 1.1rem; font-weight: 800; color: var(--dark); }

    /* ── MÉTRICAS ── */
    #metricas { background: var(--dark); color: #fff; }
    .met-hd { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem; flex-wrap: wrap; gap: 1.5rem; }
    .met-hd .stag { color: var(--c2); }
    .met-hd .stag::before { background: var(--c2); }
    .met-update { font-family: var(--font-d); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.3); display: flex; align-items: center; gap: 0.5rem; }
    .met-update .dot-live { width: 6px; height: 6px; border-radius: 50%; background: var(--c2); animation: pulse 2s infinite; }
    .met-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.06); border-radius: 6px; overflow: hidden; margin-bottom: 2rem; }
    .met-card { background: var(--dark); padding: 2.2rem 1.8rem; transition: background 0.3s; }
    .met-card:hover { background: rgba(255,255,255,0.03); }
    .met-icon { font-size: 1.2rem; margin-bottom: 1rem; opacity: 0.6; }
    .met-val { font-family: var(--font-d); font-size: clamp(2.2rem, 3.5vw, 3.2rem); font-weight: 900; line-height: 1; color: #fff; margin-bottom: 0.3rem; }
    .met-val .c-c1 { color: var(--c1); }
    .met-val .c-c2 { color: var(--c2); }
    .met-lbl { font-family: var(--font-d); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 0.5rem; }
    .met-sub { font-size: 0.8rem; color: rgba(255,255,255,0.25); line-height: 1.4; }
    .met-trend { display: inline-flex; align-items: center; gap: 0.3rem; font-family: var(--font-d); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; padding: 0.2rem 0.6rem; border-radius: 20px; margin-top: 0.5rem; }
    .trend-up { background: rgba(0,180,174,0.12); color: var(--c2); }
    .trend-dn { background: rgba(240,107,40,0.12); color: var(--c1); }
    .aud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .aud-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 6px; padding: 2rem; }
    .aud-card h4 { font-family: var(--font-d); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 1.5rem; }
    .bar-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.9rem; }
    .bar-lbl { font-family: var(--font-d); font-size: 0.8rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: rgba(255,255,255,0.55); min-width: 70px; }
    .bar-track { flex: 1; height: 6px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; background: var(--c1); width: 0%; transition: width 1.2s ease; }
    .bar-fill.tl { background: var(--c2); }
    .bar-pct { font-family: var(--font-d); font-size: 0.85rem; font-weight: 800; color: #fff; min-width: 38px; text-align: right; }

    /* MARQUEE */
    .mq { background: var(--c2); padding: 1rem 0; overflow: hidden; }
    .mq-track { display: flex; gap: 2.5rem; animation: mq 24s linear infinite; width: max-content; }
    .mq:hover .mq-track { animation-play-state: paused; }
    .mq-item { display: flex; align-items: center; gap: 0.6rem; white-space: nowrap; font-family: var(--font-d); font-size: 0.9rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #fff; }
    .mq-sep { color: rgba(255,255,255,0.35); }
    @keyframes mq { from{transform:translateX(0);} to{transform:translateX(-50%);} }

    /* ── ALCANCE ── */
    #alcance { background: var(--light); }
    .alc-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; }
    .alc-card { background: var(--white); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; transition: transform 0.25s, box-shadow 0.25s; }
    .alc-card:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(0,0,0,0.08); }
    .alc-thumb { aspect-ratio: 1/1; background: var(--dark); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .alc-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .alc-thumb-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, var(--dark) 0%, #2a2a2a 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; }
    .alc-badge { position: absolute; top: 0.8rem; right: 0.8rem; color: #fff; font-family: var(--font-d); font-size: 0.72rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.2rem 0.6rem; border-radius: 3px; }
    .alc-body { padding: 1.4rem; }
    .alc-type { font-family: var(--font-d); font-size: 0.68rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--c2); margin-bottom: 0.4rem; }
    .alc-desc { font-size: 0.87rem; color: var(--gray); line-height: 1.6; margin-bottom: 1rem; }
    .alc-stats { display: flex; gap: 1.2rem; }
    .alc-st { display: flex; align-items: center; gap: 0.3rem; font-family: var(--font-d); font-size: 0.82rem; font-weight: 700; letter-spacing: 0.05em; color: var(--dark); }
    .alc-st svg { opacity: 0.4; }

    /* ── PARCERIAS ── */
    #parcerias { background: var(--white); }
    .parc-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; }
    .parc-card { border: 1px solid var(--border); border-radius: 6px; padding: 2rem; position: relative; overflow: hidden; transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s; }
    .parc-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--c1); transform: scaleX(0); transform-origin: left; transition: transform 0.35s ease; }
    .parc-card:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(0,0,0,0.07); border-color: rgba(240,107,40,0.2); }
    .parc-card:hover::before { transform: scaleX(1); }
    .parc-card.dest { background: var(--dark); color: #fff; border-color: var(--dark); }
    .parc-card.dest::before { background: var(--c2); }
    .parc-card.dest:hover { border-color: var(--c2); }
    .parc-label { font-family: var(--font-d); font-size: 0.68rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--c1); margin-bottom: 0.8rem; }
    .parc-card.dest .parc-label { color: var(--c2); }
    .parc-name { font-family: var(--font-d); font-size: 1.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 0.6rem; }
    .parc-desc { font-size: 0.87rem; color: var(--gray); line-height: 1.7; margin-bottom: 1.4rem; }
    .parc-card.dest .parc-desc { color: rgba(255,255,255,0.5); }
    .parc-includes { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    .parc-includes li { font-size: 0.86rem; color: var(--gray); display: flex; align-items: flex-start; gap: 0.5rem; line-height: 1.4; }
    .parc-card.dest .parc-includes li { color: rgba(255,255,255,0.55); }
    .parc-includes li::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--c1); flex-shrink: 0; margin-top: 0.4rem; }
    .parc-card.dest .parc-includes li::before { background: var(--c2); }

    /* ── FORMATOS ── */
    #formatos { background: var(--light); }
    .fmt-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1.5rem; }

  const C = CONFIG;
  const img = (path) => path ? `${C.github_base}/${path}` : "";
  const reg = (name, show) => show ? `${name}<sup style="font-size:0.45rem;vertical-align:super;">®</sup>` : name;

  /* Aplica cores CSS customizadas */
  function applyColors() {
    const r = document.documentElement.style;
    const cl = C.colors;
    r.setProperty('--c1',       cl.primary);
    r.setProperty('--c1-dark',  cl.primary_dark);
    r.setProperty('--c1-light', cl.primary_light);
    r.setProperty('--c2',       cl.secondary);
    r.setProperty('--c2-dark',  cl.secondary_dark);
    r.setProperty('--c2-light', cl.secondary_light);
    r.setProperty('--dark',     cl.dark);
    r.setProperty('--gray',     cl.gray);
    r.setProperty('--light',    cl.light);
  }

  /* Badge color helper */
  function badgeBg(color) {
    if (color === 'teal')    return `background:var(--c2)`;
    if (color === 'dark')    return `background:var(--dark)`;
    return `background:var(--c1)`;
  }

    applyColors();

    const b = C.brand;
    const brandName = reg(b.name, b.registered);

    /* <title> e meta */
    document.getElementById('page-title').textContent = `Media Kit — ${b.name}`;

    /* ── NAV ── */
    document.getElementById('navbar').innerHTML = `
      <a href="${b.nav_back_url}" class="nav-logo">
        <span class="logo-word">${brandName}</span>
        <div class="logo-bar"></div>
      </a>
      <a href="${b.nav_back_url}" class="nav-back">
        ${ICONS.arrow_l} ${b.nav_back_label}
      </a>
      <span class="nav-badge">${b.nav_badge}</span>
    `;

    /* ── HERO ── */
    const h = C.hero;
    document.getElementById('hero-inner').innerHTML = `
      <div class="hb-eyebrow">
        <div class="hb-eyebrow-bar"></div>
        <span class="hb-eyebrow-text">${b.eyebrow}</span>
      </div>
      <p class="hb-name">${b.handle}</p>
      <h1 class="hb-title">
        ${h.slogan_line1}<br>
        <span class="c-c1">${h.slogan_line2}</span><br>
        <span class="c-c2">${h.slogan_line3}</span>
      </h1>
      <p class="hb-bio">${h.bio}</p>
    `;

    /* Hero bottom strip */
    const statsHtml = C.hero_stats.map((s, i) => `
      ${i > 0 ? '<div class="hb-sep"></div>' : ''}
      <div class="hb-stat">
        <span class="hb-stat-n">${s.value}</span>
        <span class="hb-stat-l">${s.label}</span>
      </div>
    `).join('');
    document.getElementById('hero-strip').innerHTML = `
      ${statsHtml}
      <a href="${C.footer.social_url}" target="_blank" class="hb-ig-badge">
        <div class="bdot"></div>
        ${ICONS.instagram}
        ${b.handle}
      </a>
    `;

    /* ── LINKTREE ── */
    const styleMap = { primary: 'lt-c1', teal: 'lt-c2', dark: 'lt-dark', outline: '' };
    const ltBtns = C.linktree.map(lk => {
      const cls = styleMap[lk.style] || '';
      const mediaHtml = lk.photo
        ? `<div class="lt-media"><img src="${img(lk.photo)}" alt="${lk.label}" /></div>`
        : `<div class="lt-media-icon">${ICONS[lk.icon] || ICONS.link}</div>`;
      return `
        <a href="${lk.url}" target="_blank" class="lt-btn ${cls}">
          ${mediaHtml}
          <span class="lt-label">${lk.label}</span>
          <span class="lt-arrow">${ICONS.arrow_r}</span>
        </a>
      `;
    }).join('');
    document.getElementById('linktree').innerHTML = `
      <div class="lt-inner">
        <p class="lt-title">Links</p>
        ${ltBtns}
      </div>
    `;

    /* ── MARQUEE ── */

    const nameHtml = s.name_lines.map((l, i) =>

    const tagsHtml = s.tags.map(t => `<span class="stag-pill sp-${t.style}">${t.label}</span>`).join('');
    const hlHtml = s.highlights.map(h => `
      <div class="sh-card ${h.accent === 'tl' ? 'tl' : ''}">
        <h5>${h.label}</h5><p>${h.value}</p>
      </div>
    `).join('');
    const profileImg = img(C.images.profile_photo);
    const photoHtml = profileImg
      ? `<img src="${profileImg}" alt="Foto de perfil" />`
      : `<div class="sobre-photo-placeholder-inner">
          ${ICONS.user_ph}
          <span>Adicione sua foto aqui</span>
         </div>`;
    document.getElementById('sobre').innerHTML = `
      <div class="sobre-grid">
        <div class="sobre-photo-wrap reveal">
          <div class="sobre-photo-area">${photoHtml}</div>
          <div class="sobre-accent"></div>
          <div class="sobre-accent-tl"></div>
        </div>
        <div class="sobre-r reveal d1">
          <div class="eyebrow">
            <div class="eyebrow-bar"></div>
            <span class="eyebrow-text">Sobre mim</span>
          </div>
          <h2 class="sobre-nome sh">${nameHtml}</h2>
          ${bioHtml}
          <div class="sobre-tags">${tagsHtml}</div>
          <div class="sobre-highlights">${hlHtml}</div>
        </div>
      </div>
    `;

    /* ── MÉTRICAS ── */
    const m = C.metrics;
    const metCardsHtml = m.cards.map(c => `
      <div class="met-card">
        <div class="met-icon">${c.icon}</div>
        <div class="met-val"><span class="c-${c.color}">${c.value}</span></div>
        <div class="met-lbl">${c.label}</div>
        <div class="met-sub">${c.sub}</div>
        <div class="met-trend trend-up">${c.trend}</div>
      </div>
    `).join('');
    const genderHtml = `
      <div class="bar-row">
        <span class="bar-lbl">${m.gender.female.label}</span>
        <div class="bar-track"><div class="bar-fill" data-width="${m.gender.female.pct}%"></div></div>
        <span class="bar-pct">${m.gender.female.pct}%</span>
      </div>
      <div class="bar-row">
        <span class="bar-lbl">${m.gender.male.label}</span>
        <div class="bar-track"><div class="bar-fill tl" data-width="${m.gender.male.pct}%"></div></div>
        <span class="bar-pct">${m.gender.male.pct}%</span>
      </div>
    `;
    const citiesHtml = m.cities.map((c, i) => `
      <div class="bar-row">
        <span class="bar-lbl">${c.name}</span>
        <div class="bar-track"><div class="bar-fill ${i % 2 === 1 ? 'tl' : ''}" data-width="${c.pct}%"></div></div>
        <span class="bar-pct">${c.pct}%</span>
      </div>
    `).join('');
    document.getElementById('metricas').innerHTML = `
      <div class="met-hd reveal">
        <div>
          <p class="stag" style="color:var(--c2);"><span style="width:20px;height:2px;background:var(--c2);display:inline-block;margin-right:0.5rem;"></span>Métricas &amp; Insights</p>
          <h2 class="sh" style="color:#fff;">NÚMEROS QUE<br>IMPORTAM</h2>
        </div>
        <div class="met-update">
          <div class="dot-live"></div>
          ${m.updated_label}
        </div>
      </div>
      <div class="met-grid reveal">${metCardsHtml}</div>
      <div class="aud-grid reveal">
        <div class="aud-card">
          <h4>Gênero da audiência</h4>
          ${genderHtml}
        </div>
        <div class="aud-card">
          <h4>Top cidades / regiões</h4>
          ${citiesHtml}
        </div>
      </div>
    `;

    /* ── ALCANCE ── */
    const SVG_EYE   = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const SVG_HEART = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
    const SVG_CHAT  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
    const SVG_IG    = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>`;
    const SVG_CLOSE = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    const SVG_IG_LOGO = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.5" fill="#fff" stroke="none"/></svg>`;
    const SVG_PLAY  = `<svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><polygon points="5,3 19,12 5,21"/></svg>`;

    const postsHtml = C.top_posts.map((p, i) => {
      const postImg  = img(C.images[`post_${i + 1}`]);
      const videoSrc = img(C.images[`video_${i + 1}`]);
      const hasVideo = !!videoSrc;
      const hasLink  = p.ig_url && p.ig_url.trim() !== '';
      const isClickable = hasVideo || hasLink;

      const thumbContent = postImg
        ? `<img src="${postImg}" alt="${p.type}" />`
        : `<div class="alc-thumb-placeholder">${ICONS.photo_ph}<span style="font-family:var(--font-d);font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.2);">Screenshot do post</span></div>`;

      const overlayIcon = hasVideo
        ? `<svg width="36" height="36" viewBox="0 0 24 24" fill="rgba(255,255,255,0.95)"><polygon points="5,3 19,12 5,21"/></svg><span>Assistir</span>`
        : `${SVG_IG_LOGO}<span>Ver no Instagram</span>`;

      const overlay = isClickable ? `
        <div class="alc-thumb-overlay">
          <div class="alc-thumb-overlay-icon">${overlayIcon}</div>
        </div>` : '';

      /* badge sempre visível (dica visual de play para mobile) */
      const playBadge = isClickable ? (hasVideo ? `
        <div class="alc-play-badge">
          <div class="alc-play-badge-circle">
            <svg width="9" height="9" viewBox="0 0 10 10" fill="#fff"><polygon points="2,1 9,5 2,9"/></svg>
          </div>
          <span class="alc-play-badge-label">Assistir</span>
        </div>` : `
        <div class="alc-play-badge ig-badge">
          <div class="alc-play-badge-circle">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.5" fill="#fff" stroke="none"/></svg>
          </div>
          <span class="alc-play-badge-label">Ver no Instagram</span>
        </div>`) : '';

      return `
        <div class="alc-card">
          <div class="alc-thumb-link ${isClickable ? 'clickable' : ''}"
               ${isClickable ? `data-post-idx="${i}" style="cursor:pointer;display:block;position:relative;"` : 'style="display:block;position:relative;"'}>
            <div class="alc-thumb">
              ${thumbContent}
              <div class="alc-badge" style="${badgeBg(p.badge_color)}">${p.badge}</div>
              ${playBadge}
            </div>
            ${overlay}
          </div>
          <div class="alc-body">
            <div class="alc-type" style="color:var(--${p.type_color === 'c1' ? 'c1' : 'c2'})">${p.type}</div>
            <p class="alc-desc">${p.desc}</p>
            <div class="alc-stats">
              <span class="alc-st">${SVG_EYE} ${p.reach}</span>
              <span class="alc-st">${SVG_HEART} ${p.likes}</span>
              <span class="alc-st">${SVG_CHAT} ${p.comments}</span>
            </div>
          </div>
        </div>`;
    }).join('');

    document.getElementById('alcance').innerHTML = `
      <div class="reveal" style="margin-bottom:3rem;">
        <p class="stag">Maior alcance</p>
        <h2 class="sh">CONTEÚDOS<br>DE DESTAQUE</h2>
      </div>
      <div class="alc-grid reveal">${postsHtml}</div>
    `;

    /* bind click on each clickable thumb */
    document.querySelectorAll('.alc-thumb-link.clickable').forEach(el => {
      el.addEventListener('click', () => openModal(parseInt(el.dataset.postIdx)));
    });

    /* ══════════════════════════════════════════════════════════════════
       MODAL ENGINE
    ══════════════════════════════════════════════════════════════════ */
    function openModal(idx) {
      const p         = C.top_posts[idx];
      const postImg   = img(C.images[`post_${idx + 1}`]);
      const videoSrc  = img(C.images[`video_${idx + 1}`]);
      const hasVideo  = !!videoSrc;
      const profilePic = img(C.images.profile_photo);
      const avatarHtml = profilePic ? `<img src="${profilePic}" alt="${C.brand.handle}" />` : '';
      const modal = document.getElementById('post-modal');
      const box   = document.getElementById('modal-box');

      if (hasVideo) {
        /* ── PLAYER MODE ── */
        box.className = 'modal-box mode-player';
        box.innerHTML = `
          <button class="modal-close" id="modal-close-btn" aria-label="Fechar">${SVG_CLOSE}</button>
          <div class="modal-video-side">
            <div class="modal-ig-bar">
              <div class="modal-ig-avatar">${avatarHtml}</div>
              <span class="modal-ig-handle">${C.brand.handle}</span>
              <span class="modal-ig-logo">${SVG_IG_LOGO}</span>
            </div>
            <video id="modal-video" src="${videoSrc}" playsinline loop
                   style="width:100%;max-height:90vh;object-fit:contain;display:block;"></video>
            <div class="modal-play-btn" id="modal-play-btn">
              <div class="modal-play-circle">${SVG_PLAY}</div>
            </div>
          </div>
          <div class="modal-info-side">
            <div class="modal-info-header">
              <div class="modal-info-avatar">${avatarHtml}</div>
              <span class="modal-info-handle">${C.brand.handle}</span>
            </div>
            <div class="modal-info-body">
              <div class="modal-info-type">${p.type}</div>
              <p class="modal-info-desc">${p.desc}</p>
              <div class="modal-info-stats">
                <div class="modal-info-st">${SVG_EYE} <strong style="margin-left:0.2rem">${p.reach}</strong>&nbsp;alcance</div>
                <div class="modal-info-st">${SVG_HEART} <strong style="margin-left:0.2rem">${p.likes}</strong>&nbsp;curtidas</div>
                <div class="modal-info-st">${SVG_CHAT} <strong style="margin-left:0.2rem">${p.comments}</strong>&nbsp;comentários</div>
              </div>
              ${p.ig_url ? `<a href="${p.ig_url}" target="_blank" rel="noopener" class="modal-info-ig-btn">${SVG_IG}&nbsp;Ver no Instagram</a>` : ''}
            </div>
          </div>`;

        const video   = document.getElementById('modal-video');
        const playBtn = document.getElementById('modal-play-btn');
        const togglePlay = () => video.paused ? video.play() : video.pause();
        video.addEventListener('click', togglePlay);
        playBtn.addEventListener('click', togglePlay);
        video.addEventListener('play',  () => playBtn.classList.add('hidden'));
        video.addEventListener('pause', () => playBtn.classList.remove('hidden'));
        video.play().catch(() => {});

      } else {
        /* ── CARD MODE (sem vídeo, abre card estilo IG com link) ── */
        const thumbHtml = postImg
          ? `<img src="${postImg}" alt="${p.type}" style="width:100%;height:100%;object-fit:cover;display:block;" />`
          : `<div class="modal-card-thumb-ph">${ICONS.photo_ph}</div>`;

        box.className = 'modal-box mode-card';
        box.innerHTML = `
          <button class="modal-close" id="modal-close-btn" aria-label="Fechar">${SVG_CLOSE}</button>
          <div class="modal-card-header">
            <div class="modal-card-avatar">${avatarHtml}</div>
            <span class="modal-card-handle">${C.brand.handle}</span>
            ${SVG_IG_LOGO}
          </div>
          <div class="modal-card-thumb">${thumbHtml}</div>
          <div class="modal-card-body">
            <div class="modal-card-type">${p.type}</div>
            <p class="modal-card-desc">${p.desc}</p>
            <div class="modal-card-stats">
              <div class="modal-card-st">${SVG_EYE} ${p.reach}</div>
              <div class="modal-card-st">${SVG_HEART} ${p.likes}</div>
              <div class="modal-card-st">${SVG_CHAT} ${p.comments}</div>
            </div>
            ${p.ig_url
              ? `<a href="${p.ig_url}" target="_blank" rel="noopener" class="modal-card-ig-btn">${SVG_IG}&nbsp;Ver post no Instagram</a>`
              : `<p style="font-family:var(--font-d);font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.25);text-align:center;">Link não disponível</p>`}
          </div>`;
      }

      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
      document.getElementById('modal-close-btn').addEventListener('click', closeModal);
      document.getElementById('modal-backdrop').addEventListener('click', closeModal);
      document.addEventListener('keydown', onKeyDown);
    }

    function closeModal() {
      const video = document.getElementById('modal-video');
      if (video) { video.pause(); video.src = ''; }
      document.getElementById('post-modal').classList.remove('open');
      document.getElementById('modal-box').innerHTML = '';
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
    }

    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    /* ── PARCERIAS ── */
    const parcHtml = C.parceria_models.map(p => `
      <div class="parc-card ${p.featured ? 'dest' : ''}">
        <p class="parc-label">${p.label}</p>
        <h3 class="parc-name">${p.name}</h3>
        <p class="parc-desc">${p.desc}</p>
        <ul class="parc-includes">${p.items.map(i => `<li>${i}</li>`).join('')}</ul>
      </div>
    `).join('');
    document.getElementById('parcerias').innerHTML = `
      <div class="reveal" style="margin-bottom:3rem;">
        <p class="stag">Como trabalhamos</p>
        <h2 class="sh">MODELOS DE<br>PARCERIA</h2>
      </div>
      <div class="parc-grid reveal">${parcHtml}</div>
    `;

    /* ── FORMATOS ── */
    const fmtHtml = C.content_formats.map(f => `
      <div class="fmt-card">
        <div class="fmt-icon-wrap">${f.icon}</div>
        <div class="fmt-name">${f.name}</div>
        <div class="fmt-dur">${f.duration}</div>
        <p class="fmt-desc">${f.desc}</p>
      </div>
    `).join('');
    document.getElementById('formatos').innerHTML = `
      <div class="reveal" style="margin-bottom:3rem;">
        <p class="stag">Formatos</p>
        <h2 class="sh">COMO CRIO<br>CONTEÚDO</h2>
      </div>
      <div class="fmt-grid reveal">${fmtHtml}</div>
    `;

    /* ── MARCAS ── */
    const marcasHtml = C.brands.map(br => {
      const logoUrl = img(br.logo);
      return `
        <div class="marca-card">
          ${logoUrl
            ? `<img src="${logoUrl}" alt="${br.name}" />`
            : `<span class="marca-name">${br.name}</span>`
          }
          <span class="marca-cat">${br.category}</span>
        </div>
      `;
    }).join('');
    document.getElementById('marcas').innerHTML = `
      <div class="marcas-hd reveal">
        <p class="stag" style="justify-content:center;">Parcerias anteriores</p>
        <h2 class="sh">MARCAS QUE<br>JÁ <span style="color:var(--c1);">CONFIAM</span></h2>
      </div>
      <div class="marcas-grid reveal">${marcasHtml}</div>
      <p class="marcas-note reveal">${C.brands_note}</p>
    `;

    /* ── CONTATO ── */
    const ct = C.contact;
    document.getElementById('contato').innerHTML = `
      <div class="bg-p"></div>
      <div class="ct-in">
        <div>
          <p class="ct-ey">${ct.eyebrow}</p>
          <h2 class="ct-h">${ct.title_line1}<br><em>${ct.title_em}</em><br>${ct.title_line3}</h2>
          <p class="ct-sub">${ct.subtitle}</p>
        </div>
        <div class="ct-btns">
          <a href="${ct.cta_primary_url}" target="_blank" class="btn-wh">
            ${ct.cta_primary_label}
            ${ICONS.arrow_r}
          </a>
          <a href="${ct.cta_secondary_url}" target="_blank" class="btn-bk">
            ${ICONS.instagram}
            ${ct.cta_secondary_label}
          </a>
        </div>
      </div>
    `;

    /* ── FOOTER ── */
    const ft = C.footer;
    document.getElementById('footer').innerHTML = `
      <div class="ft-bot">
        <a href="${ft.back_url}" class="ft-logo">${brandName}</a>
        <p class="ft-copy">${ft.copyright}</p>
        <a href="${ft.social_url}" target="_blank" class="ft-ig">
          ${ICONS.instagram} ${ft.social_label}
        </a>
      </div>
    `;
  }

  /* ══════════════════════════════════════════════════════════════════
     COMPORTAMENTOS DE UI
  ══════════════════════════════════════════════════════════════════ */

  /* Scroll nav shadow */
  const navbar = document.getElementById('navbar');
  window.addEventListener('scroll', () => navbar.classList.toggle('scrolled', window.scrollY > 40));

  /* Reveal on scroll */
  const revObs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); revObs.unobserve(e.target); } });
  }, { threshold: 0.08 });

  /* Bar animation on scroll */
  const barObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.querySelectorAll('[data-width]').forEach(bar => {
          setTimeout(() => bar.style.width = bar.dataset.width, 200);
        });
        barObs.unobserve(e.target);
      }
    });
  }, { threshold: 0.2 });

  /* Init — render then observe */
  render();

  document.querySelectorAll('.reveal').forEach(el => revObs.observe(el));
  document.querySelectorAll('.aud-card').forEach(el => barObs.observe(el));

  </script>
</body>
</html>
